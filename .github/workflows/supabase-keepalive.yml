# Prevents Supabase free-tier project from pausing due to inactivity
# Supabase pauses projects after 7 days without activity
name: Supabase Keepalive

on:
  schedule:
    # Run every 5 days at midnight UTC (before 7-day pause threshold)
    - cron: "0 0 */5 * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Write to Supabase keep_alive table
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive" \
            -X POST \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d '{"id":"singleton","pinged_at":"'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}')

          if [ "$response" -eq 200 ] || [ "$response" -eq 201 ]; then
            echo "✓ Supabase keepalive write successful (HTTP $response)"
          else
            echo "✗ Supabase keepalive write failed (HTTP $response)"
            exit 1
          fi
